<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#14181f"/>
  <!-- fretboard grid -->
  <g stroke="#313a4b" stroke-width="10">
    <line x1="120" y1="140" x2="392" y2="140"/>
    <line x1="120" y1="220" x2="392" y2="220"/>
    <line x1="120" y1="300" x2="392" y2="300"/>
    <line x1="120" y1="380" x2="392" y2="380"/>
    <line x1="120" y1="140" x2="120" y2="380"/>
    <line x1="188" y1="140" x2="188" y2="380"/>
    <line x1="256" y1="140" x2="256" y2="380"/>
    <line x1="324" y1="140" x2="324" y2="380"/>
    <line x1="392" y1="140" x2="392" y2="380"/>
  </g>
  <!-- nut -->
  <line x1="112" y1="140" x2="112" y2="380" stroke="#e8ebf0" stroke-width="18"/>
  <!-- finger dots -->
  <circle cx="222" cy="180" r="26" fill="#f5a623"/>
  <circle cx="290" cy="260" r="26" fill="#f5a623"/>
  <circle cx="222" cy="340" r="26" fill="#3ecf6e"/>
</svg>
